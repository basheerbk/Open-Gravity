<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 240" fill="none">
  <defs>
    <linearGradient id="fabric" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="40%" stop-color="#e8ebef"/>
      <stop offset="100%" stop-color="#c8ced6"/>
    </linearGradient>
    <linearGradient id="fabricShadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8bec8"/>
      <stop offset="50%" stop-color="#f0f2f5"/>
      <stop offset="100%" stop-color="#b0b8c2"/>
    </linearGradient>
    <linearGradient id="visor" x1="25%" y1="10%" x2="75%" y2="90%">
      <stop offset="0%" stop-color="#c9a227"/>
      <stop offset="25%" stop-color="#8b6914"/>
      <stop offset="55%" stop-color="#3d3010"/>
      <stop offset="100%" stop-color="#1a1508"/>
    </linearGradient>
    <radialGradient id="visorShine" cx="32%" cy="28%" r="45%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#ffd870" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffd870" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bootGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a6068"/>
      <stop offset="100%" stop-color="#2a2e34"/>
    </linearGradient>
    <linearGradient id="pack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e4ea"/>
      <stop offset="100%" stop-color="#a8b0ba"/>
    </linearGradient>
    <filter id="groundShadow" x="-30%" y="-10%" width="160%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g filter="url(#groundShadow)">
    <!-- Backpack / PLSS -->
    <ellipse cx="80" cy="108" rx="34" ry="42" fill="url(#pack)" stroke="#98a2ae" stroke-width="1.2"/>
    <rect x="68" y="72" width="24" height="10" rx="3" fill="#b8c0ca" stroke="#889098" stroke-width="0.8"/>
    <rect x="72" y="82" width="16" height="28" rx="2" fill="#a0a8b2"/>
    <circle cx="80" cy="96" r="4" fill="#6a7280"/>
    <!-- Legs -->
    <path d="M58 148 C54 148 50 158 49 178 L48 210 Q47 222 58 222 L68 222 Q74 222 73 210 L70 148 Z" fill="url(#fabric)" stroke="#a8b0ba" stroke-width="1.2"/>
    <path d="M102 148 C106 148 110 158 111 178 L112 210 Q113 222 102 222 L92 222 Q86 222 87 210 L90 148 Z" fill="url(#fabric)" stroke="#a8b0ba" stroke-width="1.2"/>
    <!-- Knee joints -->
    <ellipse cx="61" cy="178" rx="10" ry="8" fill="#d0d6de" stroke="#98a2ae" stroke-width="1"/>
    <ellipse cx="99" cy="178" rx="10" ry="8" fill="#d0d6de" stroke="#98a2ae" stroke-width="1"/>
    <!-- Boots -->
    <path d="M46 212 Q44 228 58 230 L72 230 Q78 228 76 212 L74 206 L48 206 Z" fill="url(#bootGrad)" stroke="#3a3e44" stroke-width="1"/>
    <path d="M84 212 Q86 228 102 230 L114 230 Q120 228 118 212 L116 206 L86 206 Z" fill="url(#bootGrad)" stroke="#3a3e44" stroke-width="1"/>
    <rect x="48" y="206" width="26" height="4" rx="1" fill="#c0392b" opacity="0.85"/>
    <rect x="86" y="206" width="28" height="4" rx="1" fill="#c0392b" opacity="0.85"/>
    <!-- Torso -->
    <path d="M52 98 Q48 108 50 148 L110 148 Q112 108 108 98 Q100 88 80 88 Q60 88 52 98 Z" fill="url(#fabricShadow)" stroke="#a8b0ba" stroke-width="1.2"/>
    <!-- Chest control unit -->
    <rect x="64" y="108" width="32" height="28" rx="4" fill="#d8dce2" stroke="#889098" stroke-width="1"/>
    <rect x="68" y="112" width="24" height="5" rx="1" fill="#c0392b"/>
    <rect x="68" y="120" width="18" height="3" rx="1" fill="#687080"/>
    <rect x="68" y="126" width="22" height="3" rx="1" fill="#687080"/>
    <circle cx="88" cy="124" r="3" fill="#2ecc71" opacity="0.8"/>
    <!-- Arms -->
    <path d="M48 100 Q32 108 28 128 Q26 142 34 148 L44 132 Q46 118 52 108 Z" fill="url(#fabric)" stroke="#a8b0ba" stroke-width="1.2"/>
    <path d="M112 100 Q128 108 132 128 Q134 142 126 148 L116 132 Q114 118 108 108 Z" fill="url(#fabric)" stroke="#a8b0ba" stroke-width="1.2"/>
    <!-- Gloves -->
    <ellipse cx="30" cy="152" rx="12" ry="14" fill="#e8eaee" stroke="#98a2ae" stroke-width="1.2"/>
    <ellipse cx="130" cy="152" rx="12" ry="14" fill="#e8eaee" stroke="#98a2ae" stroke-width="1.2"/>
    <rect x="22" y="148" width="16" height="6" rx="2" fill="#c0392b" opacity="0.9"/>
    <rect x="122" y="148" width="16" height="6" rx="2" fill="#c0392b" opacity="0.9"/>
    <!-- Helmet ring -->
    <ellipse cx="80" cy="72" rx="36" ry="10" fill="#c8ced6" stroke="#889098" stroke-width="1"/>
    <!-- Helmet shell -->
    <circle cx="80" cy="48" r="34" fill="url(#fabric)" stroke="#a8b0ba" stroke-width="1.5"/>
    <!-- Visor -->
    <ellipse cx="80" cy="50" rx="26" ry="28" fill="url(#visor)"/>
    <ellipse cx="80" cy="50" rx="26" ry="28" fill="url(#visorShine)"/>
    <ellipse cx="68" cy="40" rx="8" ry="5" fill="#fff" opacity="0.18"/>
    <!-- Snoopy cap / comms -->
    <path d="M58 22 Q80 8 102 22 L98 32 Q80 24 62 32 Z" fill="#2a3040" opacity="0.7"/>
  </g>
</svg>
